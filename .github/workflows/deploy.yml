name: Deploy Art Map to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build || true

          # Find the manifest file to get the entry point hash
          MANIFEST=$(ls build/client/assets/manifest-*.js | head -1)
          if [ -z "$MANIFEST" ]; then
            echo "ERROR: No manifest found"
            exit 1
          fi

          # Extract the entry module path from the manifest
          ENTRY=$(grep -o '"/art-map/assets/entry\.client[^"]*"' "$MANIFEST" | head -1 | tr -d '"')
          echo "Entry point: $ENTRY"

          # Generate index.html
          cat > build/client/index.html << HTML
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Map</title>
    <meta name="description" content="A 3D canvas where your art followers upload and display their drawings" />
    <link rel="icon" href="/art-map/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">$ENTRY</script>
  </body>
</html>
HTML
          echo "Generated index.html with entry: $ENTRY"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
