name: Deploy Art Map to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Run build; ignore prerender exit code (known SPA mode issue)
          npm run build || true
          # Verify client build exists (check for any manifest JS)
          if ! ls build/client/assets/manifest-*.js 1>/dev/null; then
            echo "ERROR: Client build not found"
            ls -la build/client/
            exit 1
          fi
          echo "Build artifacts confirmed:"
          ls build/client/assets/manifest-*.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
