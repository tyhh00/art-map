name: Deploy Art Map to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          set -e
          npm run build
        env:
          CI: true

      - name: Generate index.html
        run: |
          set -e
          # Find the manifest to get entry point hash
          MANIFEST=$(ls build/client/assets/manifest-*.js | head -1)
          echo "Manifest: $MANIFEST"
          
          # Extract entry module path
          ENTRY=$(grep -o '"/art-map/assets/entry\.client[^"]*"' "$MANIFEST" | head -1 | tr -d '"')
          echo "Entry: $ENTRY"
          
          if [ -z "$ENTRY" ]; then
            echo "ERROR: Could not extract entry point from manifest"
            exit 1
          fi
          
          cat > build/client/index.html << EOF
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Map</title>
    <meta name="description" content="A 3D canvas where your art followers upload and display their drawings" />
    <link rel="icon" href="/art-map/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">${ENTRY}</script>
  </body>
</html>
EOF
          echo "Generated index.html:"
          cat build/client/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
