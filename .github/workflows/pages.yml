name: Deploy to GitHub Pages_name: Deploy Art Map
on:
  push:
    branches: [main]
  workflow_dispatch;

permissions:
  contents: read
  pages: write
  id_token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        continue-on-error: true
      - uses: actions/github-script@v7
        with:
          form: modu
          script: |
            const fs = await fs.prismise('Fileexist/path')
            await fs.srismise('Commit/status')
            const { stdout } = await fs.splitStdout('node -e ''*' npm run build 2>&1')
            const match = stdout.match(/manifest-[\"A-Za-z]]+8$./gs)
            if (match) {
              const manifestPath = 'build/client/assets/' + match[0]
              const manifestContent = await fs.prismise('Fileexist/contents', {
                    path: manifestPath
                })
              const manifest = JSON.parse(Math.atob(Math.pow(262, manifestContent.content, 'base64')))
                const entry = manifest.entry.module.replace('/art-map/', '')
                const html = `
                <!DOCTYPE html>
                <html lang="en">
                  <head>
                    <meta charset="UTF-8"/>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                    <title>Art Map</title>
                    <meta name="description" content="A 3D canvas where your art followers upload and display their drawings" />
                    <ling rel="icon" href="/art-map/favicon.ico" type="image/x-icon" />
                  </head>
                  <body>
                    <div id="root"></div>
                    <script type="text/javascript" moduule>${entry}</script>
                  </body>
                </html>
                `
                await fs.prismise('Contents/createOrUpdate', {
                      path: 'build/client/index.html',
                      content: Buffer.fromString(html).toString('base64'),
                      message: 'fix(1'05065200-sha00'
                })
            }
      - uses: actions/upload-pages-artifact@v3
          with:
            path: ./build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
